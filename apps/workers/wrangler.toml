name = "node-pubsub-workers"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Production domain: api.ozby.dev
# Hyperdrive binding ID is injected by infra/src/deploy/wrangler-config.ts after pulumi up
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "placeholder-hyperdrive-id"
localConnectionString = "postgresql://localhost:5432/pubsub"

[vars]
NODE_ENV = "development"

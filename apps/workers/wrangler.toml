# Internal runtime identifier intentionally deferred during the IngestLens
# rebrand to avoid risky Cloudflare resource churn before deploy migration is
# planned and verified.
name = "node-pubsub-workers"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Production domain: api.ozby.dev
# Hyperdrive binding ID is injected by infra/src/deploy/wrangler-config.ts after pulumi up
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "placeholder-hyperdrive-id"
localConnectionString = "postgresql://postgres:postgres@localhost:5432/pubsub"

[[queues.producers]]
binding = "DELIVERY_QUEUE"
queue = "delivery-queue"

[[queues.consumers]]
queue = "delivery-queue"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "delivery-dlq"

[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "<cloudflare-rate-limit-namespace-id>"
simple = { limit = 100, period = 60 }

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "delivery_events"

[[durable_objects.bindings]]
name = "TOPIC_ROOMS"
class_name = "TopicRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TopicRoom"]

[vars]
NODE_ENV = "development"

packages:
  - "apps/*"
  - "apps/lab/scenarios/*"
  - "packages/*"
  - infra

catalog:
  # Runtime — shared across ≥2 apps
  axios: ^1.15.2

  # Shared UI / frontend (client + packages/ui)
  "@radix-ui/react-checkbox": ^1.3.3
  "@radix-ui/react-dialog": ^1.1.15
  "@radix-ui/react-dropdown-menu": ^2.1.16
  "@radix-ui/react-label": ^2.1.8
  "@radix-ui/react-select": ^2.2.6
  "@radix-ui/react-slot": ^1.2.4
  "@radix-ui/react-tabs": ^1.1.13
  "@radix-ui/react-toast": ^1.2.15
  "@radix-ui/react-tooltip": ^1.2.8
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  lucide-react: ^1.8.0
  next-themes: ^0.4.6
  react: ^19.2.5
  react-dom: ^19.2.5
  react-hook-form: ^7.73.1
  sonner: ^2.0.7
  tailwind-merge: ^3.5.0
  tailwindcss: ^4.2.4

  # Shared dev types
  "@types/node": ^25.6.0
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3

  # Stryker mutation testing
  "@stryker-mutator/core": ^9.6.1
  "@stryker-mutator/vitest-runner": ^9.6.1
  "@stryker-mutator/typescript-checker": ^9.6.1

  # Task runner
  vite-plus: 0.1.19

  # Shared build tools
  "@vitejs/plugin-react": ^6.0.1
  bunchee: ^6.10.0
  husky: ^9.1.7

  # Webpresso tooling (git-pointer to github.com:webpresso/tooling monorepo)
  "@webpresso/typescript-config": "git+ssh://git@github.com/webpresso/tooling.git#main&path:packages/typescript-config"
  "@webpresso/vitest-config": "git+ssh://git@github.com/webpresso/tooling.git#main&path:packages/vitest-config"
  "@webpresso/stryker-config": "git+ssh://git@github.com/webpresso/tooling.git#main&path:packages/stryker-config"

catalogs:
  tooling:
    typescript: 6.0.3
    "@typescript/native-preview": "7.0.0-dev.20260421.2"
    oxlint: ^1.61.0
    vitest: ^4.1.5

  workers:
    hono: ^4.12.14
    "@cloudflare/workers-types": ^4.20260423.1
    "@cloudflare/vitest-pool-workers": ^0.14.9
    wrangler: ^4.84.1
    drizzle-orm: ^0.45.2
    drizzle-kit: ^0.31.10
    postgres: ^3.4.9

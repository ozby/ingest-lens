name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Install
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-monorepo

  check:
    name: Check (lint + types)
    runs-on: ubuntu-latest
    needs: setup
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-monorepo
      - run: pnpm check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-monorepo
      - run: pnpm test

  catalog-drift:
    name: Catalog drift
    runs-on: ubuntu-latest
    needs: setup
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-monorepo
      - run: pnpm catalog:check

  blueprint-validate:
    name: Blueprint validation
    runs-on: ubuntu-latest
    needs: setup
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-monorepo
      - run: pnpm blueprints:check

  mutation:
    name: Mutation (affected)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-monorepo
      - run: bun ./scripts/affected-mutation.ts

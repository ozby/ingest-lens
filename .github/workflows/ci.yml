name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-monorepo

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: ./.github/actions/setup-monorepo
      - run: pnpm lint

  check-types:
    name: Type check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: ./.github/actions/setup-monorepo
      - run: pnpm check-types

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: ./.github/actions/setup-monorepo
      - run: pnpm test

  catalog-drift:
    name: Catalog drift
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: ./.github/actions/setup-monorepo
      - run: pnpm catalog:check

  blueprint-validate:
    name: Blueprint validation
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: ./.github/actions/setup-monorepo
      - run: bun ./scripts/validate-blueprints.ts

  mutation:
    name: Mutation (affected)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: ./.github/actions/setup-monorepo
        with:
          fetch-depth: "0"
      - run: bun ./scripts/affected-mutation.ts

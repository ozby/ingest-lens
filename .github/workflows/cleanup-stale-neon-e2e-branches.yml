name: cleanup-stale-neon-e2e-branches

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HAS_DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN != '' && '1' || '' }}
      HAS_DIRECT_NEON_SECRETS: ${{ secrets.NEON_API_KEY != '' && secrets.NEON_PROJECT_ID != '' && secrets.NEON_PARENT_BRANCH_ID != '' && '1' || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject Neon control-plane secrets from Doppler
        if: env.HAS_DOPPLER_TOKEN == '1'
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Skip when neither Doppler nor direct Neon credentials are available
        if: env.HAS_DOPPLER_TOKEN != '1' && env.HAS_DIRECT_NEON_SECRETS != '1'
        run: echo "Skipping Neon cleanup because no secret-manager token or direct Neon credentials are configured."

      - name: Cleanup stale e2e branches via Doppler-managed env
        if: env.HAS_DOPPLER_TOKEN == '1'
        run: pnpm --filter @repo/e2e run db:branch:cleanup

      - name: Cleanup stale e2e branches via direct GitHub Secrets fallback
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_PARENT_BRANCH_ID: ${{ secrets.NEON_PARENT_BRANCH_ID }}
        if: env.HAS_DOPPLER_TOKEN != '1' && env.HAS_DIRECT_NEON_SECRETS == '1'
        run: pnpm --filter @repo/e2e run db:branch:cleanup

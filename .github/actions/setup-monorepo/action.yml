name: Setup monorepo
description: Install Node 24 + pnpm 10 + Bun, then install dependencies

inputs:
  fetch-depth:
    description: Git fetch depth
    default: "1"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 10.33.0

    - uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: pnpm

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash

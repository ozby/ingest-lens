name: Setup monorepo
description: Install Bun, Node 24, pnpm 10, and project dependencies

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 10

    - uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: pnpm

    - uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash

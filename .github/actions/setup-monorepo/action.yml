name: Setup monorepo
description: Install Node 24 + pnpm 10 + Bun, then install dependencies

inputs:
  fetch-depth:
    description: Git fetch depth
    default: "1"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Enable Corepack pnpm
      shell: bash
      run: |
        corepack enable
        corepack prepare pnpm@10.33.0 --activate

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash

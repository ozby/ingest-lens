config:
  node-pubsub:domain: ozby.dev
  # Set these via: pulumi config set --secret <key> <value> --stack prd
  # node-pubsub:cloudflareAccountId: <your CF account ID>
  # node-pubsub:cloudflareZoneId: <CF zone ID for ozby.dev>
  # node-pubsub:neonConnectionString: <postgresql://... prd connection string>
  #
  # After setting secrets, run from infra/:
  #   doppler run --project ozby-shell --config production -- pulumi up --yes --stack prd
  # Then sync IDs into wrangler.toml:
  #   doppler run --project ozby-shell --config production -- bun ./src/deploy/sync-wrangler-ids.ts prd
